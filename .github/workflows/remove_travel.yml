name: Remove Travel Data

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Remove travel entries
        run: |
          python3 -c "
import json
with open('docs/heatmap.json') as f:
    data = json.load(f)
cleaned = [a for a in data if a.get('type') != 'travel']
with open('docs/heatmap.json', 'w') as f:
    json.dump(cleaned, f)
print(f'Done. Removed travel entries. Remaining: {len(cleaned)} activities')
"

      - name: Commit cleaned heatmap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/heatmap.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Remove travel data"
          git pull --rebase origin main
          git push
