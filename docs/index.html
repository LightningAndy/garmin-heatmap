<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Garmin Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body, #map { height: 100%; margin: 0; background: #111; }
    #status { position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
              background: rgba(0,0,0,0.7); color: white; padding: 6px 14px;
              border-radius: 20px; font-family: sans-serif; font-size: 13px;
              z-index: 9999; }
  </style>
</head>
<body>
  <div id="status">Loading heatmap...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- leaflet.heat inlined to avoid CDN issues -->
  <script>

  <script src="https://cdn.jsdelivr.net/npm/simpleheat@0.4.0/simpleheat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <script>
    const map = L.map('map', { preferCanvas: true }).setView([51.5, -0.1], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      maxZoom: 19
    }).addTo(map);

    const status = document.getElementById('status');

    fetch('heatmap.json')
      .then(r => {
        if (!r.ok) throw new Error('heatmap.json not found: ' + r.status);
        return r.json();
      })
      .then(data => {
        if (!data.length) { status.textContent = '⚠️ No points in heatmap.json'; return; }

        const pts = data.map(p => [p.lat, p.lon, 0.5]);

        if (typeof L.heatLayer === 'undefined') {
          status.textContent = '❌ leaflet.heat failed to load';
          return;
        }

        L.heatLayer(pts, {
          radius: 8,
          blur: 10,
          maxZoom: 17,
          gradient: { 0.2: '#00f', 0.5: '#ff6600', 1.0: '#f00' }
        }).addTo(map);

        // Auto-fit map to your data
        const lats = data.map(p => p.lat);
        const lons = data.map(p => p.lon);
        map.fitBounds([
          [Math.min(...lats), Math.min(...lons)],
          [Math.max(...lats), Math.max(...lons)]
        ]);

        status.textContent = `✅ ${data.length.toLocaleString()} GPS points loaded`;
        setTimeout(() => status.style.display = 'none', 3000);
      })
      .catch(e => { status.textContent = '❌ ' + e.message; console.error(e); });
  </script>
</body>
</html>
