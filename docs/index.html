<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Garmin Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #map { height: 100%; background: #0a0a1a; }

    #controls {
      position: fixed; top: 12px; left: 12px; z-index: 9999;
      background: rgba(5, 10, 30, 0.92);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 12px; padding: 14px 16px;
      color: #cce; font-family: sans-serif; font-size: 13px;
      min-width: 220px; backdrop-filter: blur(8px);
    }
    #controls h3 {
      font-size: 13px; font-weight: 600; color: #7df;
      margin-bottom: 12px; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .ctrl-group { margin-bottom: 12px; }
    .ctrl-group label { display: block; color: #89c; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .ctrl-group select, .ctrl-group input[type=range] { width: 100%; }
    select {
      background: rgba(0,30,60,0.8); color: #adf;
      border: 1px solid rgba(0,180,255,0.3); border-radius: 6px;
      padding: 5px 8px; font-size: 12px; width: 100%;
    }
    input[type=range] { accent-color: #0cf; }
    .val-display { float: right; color: #7df; font-size: 11px; }

    #status {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #7df;
      padding: 6px 16px; border-radius: 20px;
      font-family: sans-serif; font-size: 12px; z-index: 9999;
      border: 1px solid rgba(0,200,255,0.2);
    }

    #toggle-btn {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: rgba(5,10,30,0.9); border: 1px solid rgba(0,200,255,0.2);
      color: #7df; border-radius: 8px; padding: 7px 12px;
      font-size: 12px; cursor: pointer; font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <button id="toggle-btn" onclick="toggleControls()">⚙ Controls</button>

  <div id="controls">
    <h3>🗺 Heatmap Controls</h3>

    <div class="ctrl-group">
      <label>Activity Type</label>
      <select id="filter-type" onchange="applyFilters()">
        <option value="all">All Activities</option>
      </select>
    </div>

    <div class="ctrl-group">
      <label>From Date</label>
      <input type="date" id="filter-from" onchange="applyFilters()"
        style="background:rgba(0,30,60,0.8);color:#adf;border:1px solid rgba(0,180,255,0.3);border-radius:6px;padding:5px 8px;font-size:12px;width:100%;">
    </div>

    <div class="ctrl-group">
      <label>To Date</label>
      <input type="date" id="filter-to" onchange="applyFilters()"
        style="background:rgba(0,30,60,0.8);color:#adf;border:1px solid rgba(0,180,255,0.3);border-radius:6px;padding:5px 8px;font-size:12px;width:100%;">
    </div>

    <div class="ctrl-group">
      <label>Radius <span class="val-display" id="radius-val">8</span></label>
      <input type="range" id="ctrl-radius" min="2" max="25" value="8"
        oninput="document.getElementById('radius-val').textContent=this.value; updateHeat()">
    </div>

    <div class="ctrl-group">
      <label>Blur <span class="val-display" id="blur-val">12</span></label>
      <input type="range" id="ctrl-blur" min="1" max="30" value="12"
        oninput="document.getElementById('blur-val').textContent=this.value; updateHeat()">
    </div>

    <div class="ctrl-group">
      <label>Intensity <span class="val-display" id="intensity-val">0.5</span></label>
      <input type="range" id="ctrl-intensity" min="1" max="10" value="5"
        oninput="document.getElementById('intensity-val').textContent=(this.value/10).toFixed(1); updateHeat()">
    </div>
  </div>

  <div id="status">Loading heatmap...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simpleheat@0.4.0/simpleheat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <script>
    const map = L.map('map', { preferCanvas: true }).setView([51.5, -0.1], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO', maxZoom: 19
    }).addTo(map);

    // Cool ocean gradient
    const GRADIENT = {
      0.0: '#000033',
      0.2: '#003399',
      0.4: '#0066cc',
      0.6: '#00ccdd',
      0.8: '#66eeff',
      1.0: '#ffffff'
    };

    let allData = [];
    let heatLayer = null;

    function toggleControls() {
      const c = document.getElementById('controls');
      c.style.display = c.style.display === 'none' ? 'block' : 'none';
    }

    function getFilteredPoints() {
      const type = document.getElementById('filter-type').value;
      const from = document.getElementById('filter-from').value;
      const to = document.getElementById('filter-to').value;
      const intensity = parseFloat(document.getElementById('ctrl-intensity').value) / 10;

      return allData
        .filter(p => type === 'all' || p.type === type)
        .filter(p => !from || !p.date || p.date >= from)
        .filter(p => !to   || !p.date || p.date <= to)
        .map(p => [p.lat, p.lon, intensity]);
    }

    function updateHeat() {
      const pts = getFilteredPoints();
      const radius = parseInt(document.getElementById('ctrl-radius').value);
      const blur = parseInt(document.getElementById('ctrl-blur').value);

      if (heatLayer) map.removeLayer(heatLayer);
      heatLayer = L.heatLayer(pts, {
        radius, blur, maxZoom: 17, gradient: GRADIENT
      }).addTo(map);

      document.getElementById('status').textContent =
        `${pts.length.toLocaleString()} points shown`;
    }

    function applyFilters() { updateHeat(); }

    function populateTypeFilter(data) {
      const types = [...new Set(data.map(p => p.type).filter(Boolean))].sort();
      const sel = document.getElementById('filter-type');
      types.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        sel.appendChild(opt);
      });
    }

    fetch('heatmap.json')
      .then(r => { if (!r.ok) throw new Error('heatmap.json not found'); return r.json(); })
      .then(data => {
        allData = data;
        populateTypeFilter(data);

        // Set date range defaults
        const dates = data.map(p => p.date).filter(Boolean).sort();
        if (dates.length) {
          document.getElementById('filter-from').value = dates[0];
          document.getElementById('filter-to').value = dates[dates.length - 1];
        }

        // Auto-fit map
        const lats = data.map(p => p.lat);
        const lons = data.map(p => p.lon);
        map.fitBounds([
          [Math.min(...lats), Math.min(...lons)],
          [Math.max(...lats), Math.max(...lons)]
        ]);

        updateHeat();
      })
      .catch(e => {
        document.getElementById('status').textContent = '❌ ' + e.message;
        console.error(e);
      });
  </script>
</body>
</html>
