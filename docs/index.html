<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Garmin Heatmap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style> html, body, #map { height: 100%; margin: 0; background: #111; } </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script>
    const map = L.map('map', { preferCanvas: true }).setView([51.5, -0.1], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    fetch('heatmap.json')
      .then(r => r.json())
      .then(data => {
        const pts = data.map(p => [p.lat, p.lon, 0.4]);
        L.heatLayer(pts, {
          radius: 6, blur: 8, maxZoom: 17,
          gradient: { 0.2: '#0000ff', 0.5: '#ff6600', 1.0: '#ff0000' }
        }).addTo(map);
      });
  </script>
</body>
</html>
